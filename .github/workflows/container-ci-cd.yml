name: Container CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify code, build, and containers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: service-a
            path: ./service-a
          - service: service-b
            path: ./service-b
          - service: service-c
            path: ./service-c

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.path }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: |
          pip install -r requirements.txt
          pip install pytest==8.2.2

      - name: Run tests
        working-directory: ${{ matrix.path }}
        run: pytest -v

      - name: Build check (syntax/compile)
        working-directory: ${{ matrix.path }}
        run: python -m py_compile app.py

      - name: Build Docker image locally
        run: |
          docker build \
            -t ${{ matrix.service }}:${{ github.sha }} \
            -f ${{ matrix.path }}/Dockerfile \
            ${{ matrix.path }}

  verify-compose:
    name: Verify Docker Compose stack
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config

      - name: Build Compose stack
        run: docker compose build --pull

      # `--wait` blocks until every service reports healthy (via each
      # service's HEALTHCHECK)
      - name: Start Compose stack (wait for healthy)
        run: docker compose up -d --wait --wait-timeout 90

      - name: Show running services
        run: docker compose ps

      # NOTE: this project's Nginx gateway proxies "/" straight to Service A's
      # own /health route on host port 80 (see nginx/nginx-docker.conf), not
      # ":8080/service-a/health". Documented in README under CI/CD Pipeline.
      - name: Check gateway health
        run: curl --fail http://localhost/health

      - name: Verify full pipeline (POST /telemetry)
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost/telemetry \
            -H "Content-Type: application/json" \
            -d '{
              "satellite_id": "SAT-001",
              "mission_id": "MISSION-ALPHA-7",
              "timestamp": "2026-06-18T09:30:00Z",
              "telemetry_frame": {
                "battery_voltage": 14.2,
                "solar_panel_temp": 45.3,
                "gyro_x": 0.01,
                "gyro_y": -0.02,
                "gyro_z": 0.00,
                "signal_strength_dbm": -85,
                "downlink_frequency": 437.5
              }
            }')
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"accepted"'

      - name: Verify Service B and C are not published on the host
        run: |
          ! curl -sf --connect-timeout 3 http://localhost:3002/health && echo "Service B correctly unreachable from host"
          ! curl -sf --connect-timeout 3 http://localhost:3003/health && echo "Service C correctly unreachable from host"

      - name: Stop Compose stack
        if: always()
        run: docker compose down -v

  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: verify-compose
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: nginx
            path: ./nginx
          - service: service-a
            path: ./service-a
          - service: service-b
            path: ./service-b
          - service: service-c
            path: ./service-c

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short commit hash
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ matrix.service }}:sha-${{ env.SHORT_SHA }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Write deployment summary
        run: |
          echo "### Published Image" >> "$GITHUB_STEP_SUMMARY"
          echo "Service: ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ matrix.service }}:sha-${{ env.SHORT_SHA }}" >> "$GITHUB_STEP_SUMMARY"
