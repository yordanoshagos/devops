
# Production compose file: pulls pre-built images from Docker Hub instead of
# building from local source. Used by scripts/deploy.sh.
# Requires DOCKERHUB_USERNAME, APP_NAME, and IMAGE_TAG to be set in the
# environment (see .env.example).
#
# Network isolation: only nginx sits on "frontend" and publishes a host port.
# service-b/service-c sit on "backend" only, which is marked internal so it
# has no route to the outside world. service-a bridges both networks so it
# can receive client traffic via nginx and call through to service-b/c.

services:
  nginx:
    # NOTE: deploy.sh runs `docker compose pull` before `up`, so the pulled
    # public nginx:1.27-alpine wins in the current deploy flow. The build
    # stanza here is defensive/for-consistency-with-the-dev-file only. A
    # follow-up should publish a custom nginx image and switch this to
    # image: <registry>/devops-satellite-telemetry-nginx:<sha>.
    build: ./nginx
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ground-station-api:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  ground-station-api:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-service-a:${IMAGE_TAG}
    container_name: ground-station-api
    environment:
      - TELEMETRY_PARSER_URL=http://telemetry-parser:3002/parse
      - ANOMALY_DETECTOR_URL=http://anomaly-detector:3003/analyze
    depends_on:
      telemetry-parser:
        condition: service_healthy
      anomaly-detector:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped

  telemetry-parser:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-service-b:${IMAGE_TAG}
    container_name: telemetry-parser
    environment:
      - ANOMALY_DETECTOR_URL=http://anomaly-detector:3003/analyze
    networks:
      - backend
    restart: unless-stopped

  anomaly-detector:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-service-c:${IMAGE_TAG}
    container_name: anomaly-detector
    environment:
      - GROUND_STATION_CALLBACK_URL=http://ground-station-api:3001/callback
    networks:
      - backend
    restart: unless-stopped

networks:
  frontend:
  backend:
    internal: true
